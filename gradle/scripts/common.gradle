// Common Gradle conventions for CTNH submodules (excluding GregTech-Modern)
// Keep behavior identical to the previous per-module build.gradle copies.

buildscript {
    repositories {
        maven { url = 'https://repo.spongepowered.org/repository/maven-public/' }
        mavenCentral()
    }
    dependencies {
        classpath 'org.spongepowered:mixingradle:0.7-SNAPSHOT'
    }
}

apply plugin: 'idea'
apply plugin: 'maven-publish'
apply plugin: 'java-library'
apply plugin: 'net.neoforged.moddev.legacyforge'
apply plugin: 'com.diffplug.spotless'
apply plugin: 'io.freefair.lombok'

version = mod_version
group = maven_group
base { archivesName = archives_base_name }
java { sourceCompatibility = targetCompatibility = JavaVersion.VERSION_17 }

sourceSets {
    // Include resources generated by data generators.
    main.resources {
        srcDir 'src/generated/resources'
    }

    client {
        compileClasspath += main.output
        runtimeClasspath += main.output + main.runtimeClasspath
    }
}

configurations {
    // set these as unresolvable so we don't accidentally force all dependents to use them with us
    clientRuntimeOnly.canBeResolved = false

    runtimeClasspath.extendsFrom localRuntime
    clientRuntimeClasspath.extendsFrom clientLocalRuntime
}

afterEvaluate {
    configurations {
        // same as above but for the modRuntimeOnly configurations
        modClientRuntimeOnly.canBeResolved = false
    }
}

obfuscation {
    createRemappingConfiguration(configurations.localRuntime)
    createRemappingConfiguration(configurations.clientLocalRuntime)
}

apply from: "$rootDir/gradle/scripts/repositories.gradle"
apply from: "$rootDir/gradle/scripts/spotless.gradle"
apply from: "$rootDir/gradle/scripts/moddevgradle.gradle"
apply from: "$rootDir/gradle/scripts/dependencies.gradle"

jar {
    manifest.attributes([
        "MixinConfigs": "${mod_id}.mixins.json"
    ])
}

tasks.named('processResources', ProcessResources).configure {
    var properties = [
        "mod_license"      : mod_license,
        "mod_id"           : mod_id,
        "mod_version"      : mod_version,
        "mod_name"         : mod_name,
        "mod_url"          : mod_url,
        "mod_author"       : mod_author,
        "mod_description"  : mod_description,
        "forge_version"    : forge_version.split("\\.")[0],
        "minecraft_version": minecraft_version,
        "gtceu_version"    : gtceu_version,
    ]

    inputs.properties(properties)

    filesMatching("META-INF/mods.toml") {
        expand properties + [project: project]
    }
}

tasks.named('jar', Jar).configure { finalizedBy 'reobfJar' }

tasks.withType(JavaCompile).configureEach {
    options.encoding = "UTF-8"
    options.release.set(17)
    options.compilerArgs << "-Aquiet=true"
}

lombok {
    version = "1.18.38"
}
